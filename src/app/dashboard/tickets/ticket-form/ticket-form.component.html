<form (ngSubmit)="submitForm(title.value, request.value)" #form>
  <app-control label="Title">
    <input type="text" name="title" id="title" #title #input />
  </app-control>

  <app-control label="Request">
    <textarea type="text" name="request" id="request" rows="3" #request #input></textarea>
  </app-control>

  <p>
    <button app-button>
      Submit
    </button>
  </p>
</form>
